<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interregno dei Proverbi - Menu Principale</title>
    <style>
        /* --- RESET & ATMOSFERA CUBA --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #111215 0%, #070709 100%);
            font-family: 'Cinzel', 'Georgia', 'Times New Roman', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #c4b693; /* Oro sbiadito tipico dei menu FromSoftware */
        }

        /* Sfondo fumoso di nebbia artificiale */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 120%, rgba(196, 182, 147, 0.04), transparent 60%);
            pointer-events: none;
        }

        /* --- LAYOUT DEL MENU --- */
        .elden-menu {
            text-align: center;
            width: 100%;
            max-width: 750px; 
            padding: 20px;
            z-index: 10;
        }

        /* --- TITOLO SOLENNE --- */
        .titolo-principale {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 14px;
            color: #f6e3b4;
            text-shadow: 0 0 15px rgba(246, 227, 180, 0.15);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* --- TESTO NARRATIVO STILE PARAGRAFO --- */
        .descrizione-lore {
            font-size: 1.3rem;   
            font-weight: 300;
            letter-spacing: 3px; 
            line-height: 1.8;    
            color: #bfae85;
            max-width: 680px;    
            margin: 0 auto 25px auto;
            text-transform: none; 
            font-style: italic;   
            opacity: 0.95;       
        }

        /* La sottile linea dorata della grazia */
        .linea-grazia {
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(246, 227, 180, 0.4) 50%, transparent 100%);
            margin: 0 auto 40px auto;
            position: relative;
        }

        .linea-grazia::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: #f6e3b4;
            border-radius: 50%;
            box-shadow: 0 0 8px #f6e3b4;
        }

        /* --- LISTA OPZIONI (STILE SITO DI GRAZIA) --- */
        .lista-opzioni {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        /* Il Singolo Pulsante */
        .opzione-link {
            text-decoration: none;
            color: #a39678;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 10px 40px;
            width: 100%;
            transition: all 0.4s ease;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid transparent;
        }

        /* Effetto Selezione (Hover) */
        .opzione-link:hover {
            color: #f6e3b4;
            text-shadow: 0 0 10px rgba(246, 227, 180, 0.6);
            background: linear-gradient(90deg, transparent, rgba(196, 182, 147, 0.04) 50%, transparent);
        }

        /* Le due parentesi dorate che appaiono ai lati del testo selezionato */
        .opzione-link::before,
        .opzione-link::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 60%;
            border-color: #f6e3b4;
            border-style: solid;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .opzione-link::before {
            left: 20px;
            border-width: 0 0 0 1px; 
            transform: translateX(10px);
        }

        .opzione-link::after {
            right: 20px;
            border-width: 0 1px 0 0; 
            transform: translateX(-10px);
        }

        .opzione-link:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        .opzione-link:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- FOOTER MINIMALE --- */
        .footer-elden {
            margin-top: 60px;
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: #8b8779;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="elden-menu">
        <h1 class="titolo-principale">Interregno</h1>
        
        <p class="descrizione-lore">
            Chi cazzo ha rubato la Luna della Morte nella Notte dei neri coltelli?
        </p>
        
        <div class="linea-grazia"></div>

        <div class="lista-opzioni">
            
            <a href="../chi_semina_vento/index.html" class="opzione-link">
                Chi semina vento, raccoglie tempesta
            </a>

            <a href="../chi_dorme_non_pija_pesci/index.html" class="opzione-link">
                Chi dorme non pija pesci
            </a>

            <a href="../caval_donato/index.html" class="opzione-link">
                A caval donato non si guada in bocca
            </a>

            <a href="../quando_il_gatto_non_ce_i_topi_ballano/index.html" class="opzione-link">
                Quando il gatto non c'è, i topi ballano
            </a>

        </div>

        <div class="footer-elden">
            <p>MCMXXVI — Noi, Emma Lepore e Borrazzo Alessia, l'abbiamo rubata</p>
        </div>
    </div>

</body>
</html>
