<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Club - Real Cat Attack Edition</title>
    <style>
        /* --- VARIABILI DI RITMO E COLORE (BPM) MODIFICABILI DA JAVASCRIPT --- */
        :root {
            --ritmo-strobo: 0.08s;   
            --ritmo-laser-l: 1s;     
            --ritmo-laser-r: 1.1s;   
            --ritmo-eq: 0.35s;       
            --ritmo-topi-base: 0.42s;
            --colore-strobo: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #010103;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- IMMERSIONE LUCI COLORATE DI SCONDO --- */
        .ambient-strobo {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 10; pointer-events: none;
            animation: intenseStrobe var(--ritmo-strobo) infinite steps(2);
            opacity: 0.15;
        }

        .led-wash-left {
            position: absolute; top: 0; left: 0; width: 35%; height: 100vh;
            background: radial-gradient(circle at 0% 50%, rgba(0, 255, 255, 0.25), transparent 70%);
            z-index: 2; pointer-events: none;
        }
        .led-wash-right {
            position: absolute; top: 0; right: 0; width: 35%; height: 100vh;
            background: radial-gradient(circle at 100% 50%, rgba(255, 0, 85, 0.25), transparent 70%);
            z-index: 2; pointer-events: none;
        }

        /* --- IMPIANTO LASER MULTICOLORE --- */
        .laser-container {
            position: absolute;
            top: 12%; width: 100%; height: 43vh;
            overflow: hidden; z-index: 3; pointer-events: none;
            transition: all 0.5s ease;
        }

        .laser {
            position: absolute; top: 0; width: 3.5px; height: 160%;
            transform-origin: top center;
        }

        .l-cyan { left: 4%; background: linear-gradient(to bottom, #00ffff, transparent); box-shadow: 0 0 22px #00ffff; animation: laserScanLeft var(--ritmo-laser-l) infinite ease-in-out alternate; }
        .l-pink { left: 15%; background: linear-gradient(to bottom, #ff0055, transparent); box-shadow: 0 0 22px #ff0055; animation: laserScanLeft calc(var(--ritmo-laser-l) * 1.3) infinite ease-in-out alternate 0.15s; }
        .l-lime { right: 15%; background: linear-gradient(to bottom, #39ff14, transparent); box-shadow: 0 0 22px #39ff14; animation: laserScanRight calc(var(--ritmo-laser-r) * 1.2) infinite ease-in-out alternate 0.3s; }
        .l-yellow { right: 4%; background: linear-gradient(to bottom, #fffb00, transparent); box-shadow: 0 0 22px #fffb00; animation: laserScanRight var(--ritmo-laser-r) infinite ease-in-out alternate 0.05s; }

        /* --- SOFFITTO --- */
        .ceiling {
            position: absolute; top: 0; width: 100%; height: 12%; background: #000; z-index: 8; border-bottom: 2px solid #111;
        }

        .disco-ball-container {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center;
        }
        .rod { width: 4px; height: 25px; background: #333; }
        .disco-ball {
            width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #fff, #555 50%, #050505 90%); border-radius: 50%; box-shadow: 0 0 35px rgba(255, 255, 255, 0.6);
            background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px); background-size: 5px 5px;
        }

        /* --- STAGE BACKGROUND & LED WALL --- */
        .stage-backdrop {
            position: absolute; top: 12%; width: 100%; height: 43%; background: #030308; z-index: 1; display: flex; justify-content: center; align-items: flex-end; transition: opacity 0.4s ease;
        }

        .led-wall {
            position: absolute; top: 8%; width: 75%; height: 58%; background: #000; border: 4px solid #151515; box-shadow: 0 0 40px rgba(255, 0, 85, 0.15); overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .graphic-equalizer {
            position: absolute; width: 100%; height: 100%; display: flex; justify-content: space-around; align-items: flex-end; opacity: 0.22;
        }
        .eq-bar { width: 3%; background: #00ffff; animation: jumpBar var(--ritmo-eq) infinite alternate ease-in-out; }
        .eq-bar:nth-child(5n+1) { background: #ff0055; animation-duration: calc(var(--ritmo-eq) * 0.8); }
        .eq-bar:nth-child(5n+2) { background: #39ff14; animation-duration: calc(var(--ritmo-eq) * 1.1); }
        .eq-bar:nth-child(5n+3) { background: #fffb00; animation-duration: calc(var(--ritmo-eq) * 0.7); }
        .eq-bar:nth-child(5n+4) { background: #cc00ff; animation-duration: calc(var(--ritmo-eq) * 0.9); }

        /* 👑 INSERITO QUI: NUOVO CONTENITORE CSS PER LA GERARCHIA VISIVA DEL TESTO */
        .text-container {
            position: relative;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            font-family: 'Impact', sans-serif;
            letter-spacing: 1px;
        }

        /* Frase sopra: Grande */
        .main-proverb-display {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            transition: all 0.2s ease;
            margin-bottom: 5px;
        }

        /* Frase sotto: Più piccola */
        .sub-instruction-display {
            color: #00ffff;
            font-size: 0.95rem;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
            transition: all 0.2s ease;
        }

        /* CASSE AUDIO INTERATTIVE */
        .audio-stack {
            position: absolute; bottom: 0; width: 65px; height: 120px; background: #111; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 5px; z-index: 2; cursor: pointer; transition: transform 0.1s ease;
        }
        .audio-stack:hover { filter: brightness(1.3); transform: scale(1.03); }
        .audio-stack:active { transform: scale(0.95); }
        .audio-stack.left { left: 2%; } .audio-stack.right { right: 2%; }
        .speaker-cone { width: 38px; height: 38px; background: #000; border: 3px solid #ff0055; border-radius: 50%; animation: punchBass var(--ritmo-eq) infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- DJ BOOTH --- */
        .dj-booth-group {
            position: absolute; bottom: 0; display: flex; flex-direction: column; align-items: center; z-index: 5; cursor: pointer;
        }

        .dj-rat {
            width: 40px; height: 55px; background: #1c1c24; border-radius: 45% 45% 20% 20%; position: relative; margin-bottom: -12px;
            animation: djHeadBang var(--ritmo-eq) infinite alternate ease-in-out;
        }
        .dj-rat .ear { position: absolute; top: -10px; width: 18px; height: 18px; background: #1c1c24; border-radius: 50%; border: 2px solid #ffb3cc; }
        .dj-rat .ear.left { left: -4px; } .dj-rat .ear.right { right: -4px; }
        .dj-rat .snout { position: absolute; top: -5px; left: 12px; width: 16px; height: 10px; background: #1c1c24; border-radius: 50%; }
        .dj-rat .eye { position: absolute; top: 8px; width: 4px; height: 4px; background: #ff0055; border-radius: 50%; box-shadow: 0 0 5px #ff0055; }
        .dj-rat .eye.left { left: 8px; } .dj-rat .eye.right { right: 28px; }
        
        .dj-headphones {
            position: absolute; top: -12px; left: -6px; width: 52px; height: 25px; border: 4px solid #00ffff; border-bottom: transparent; border-radius: 50% 50% 0 0;
        }

        .dj-table {
            width: 170px; height: 45px; background: #0a0a0f; border: 2px solid #00ffff; border-radius: 6px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        }
        .mini-jog { width: 32px; height: 32px; background: radial-gradient(circle, #222 30%, #000 40%, #111 80%); border: 1px solid #333; border-radius: 50%; animation: spinDisc 1.5s infinite linear; }
        .mini-mixer { width: 45px; height: 32px; background: #13131c; border: 1px solid #ff0055; border-radius: 3px; }

        .stage-fence { position: absolute; top: 55vh; width: 100%; height: 10px; background: repeating-linear-gradient(90deg, #222, #222 4px, transparent 4px, transparent 15px); border-top: 2px solid #333; z-index: 4; }

        /* --- DANCEFLOOR --- */
        #dancefloor-low {
            position: absolute; top: 56vh; left: 0; width: 100%; height: 44vh; z-index: 15; pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s;
        }
        .rat-character { position: absolute; transform-origin: bottom center; animation: ratGlobalDance var(--durata-personale, 0.4s) infinite alternate ease-in-out; }
        .rat-body { width: 100%; height: 100%; border-radius: 45% 45% 30% 30%; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.85); }
        .rat-snout { position: absolute; width: 56%; height: 31%; top: -16%; left: 22%; border-radius: 50% 50% 40% 40%; }
        .rat-snout::after { content: ''; position: absolute; top: -2px; left: 40%; width: 20%; height: 20%; background: #ffb3cc; border-radius: 50%; }
        .rat-ear { position: absolute; top: -24%; width: 42%; height: 29%; border-radius: 50%; border: 3px solid #ffb3cc; }
        .rat-ear.left { left: -4%; transform: rotate(-10deg); } .rat-ear.right { right: -4%; transform: rotate(10deg); }
        .rat-eye { position: absolute; top: 15%; width: 10%; height: 10%; background: #00ffff; border-radius: 50%; box-shadow: 0 0 6px #00ffff; }
        .rat-eye.left { left: 15%; } .rat-eye.right { right: 15%; }
        .rat-tail { position: absolute; left: 48%; width: 3.5px; background: #ffb3cc; border-radius: 3px; transform-origin: top center; animation: tailSwivel 0.18s infinite alternate ease-in-out; z-index: -1; }

        /* --- ZAMPE GATTO --- */
        .cat-paw-img {
            position: absolute;
            top: 38vh;
            width: 360px; 
            height: auto;
            z-index: 99;
            pointer-events: none;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.9)) contrast(1.1);
            transition: transform 0.1s ease;
        }
        
        #cat-paw-left { left: -400px; transform: rotate(0deg); }
        #cat-paw-right { right: -400px; transform: scaleX(-1) rotate(0deg); }

        @keyframes swipeFromLeft {
            0% { left: -400px; }
            15% { left: -15px; }   
            75% { left: -15px; }   
            100% { left: -400px; } 
        }

        @keyframes swipeFromRight {
            0% { right: -400px; }
            15% { right: -15px; }   
            75% { right: -15px; }   
            100% { right: -400px; } 
        }

        .animate-paw-left { animation: swipeFromLeft 2.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-paw-right { animation: swipeFromRight 2.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        /* --- VISTA CONSOLE IN PRIMA PERSONA --- */
        #dj-first-person-view {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 25;
            background: linear-gradient(to top, #030306 90%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out;
        }

        .numark-party-mix {
            width: 100vw; height: 58vh; background: #0f1015; border-top: 4px solid #232530;
            box-shadow: 0 -30px 120px rgba(0,0,0,1), inset 0 2px 8px rgba(255,255,255,0.12);
            display: flex; padding: 3vh 3vw 4vh 3vw; position: relative;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .brand-logo-top { position: absolute; top: 2.2vh; left: 29vw; color: #ffffff; font-family: 'Arial Black', sans-serif; font-size: 1.6rem; font-style: italic; letter-spacing: -1.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .brand-logo-front { position: absolute; bottom: 1.2vh; left: 50%; transform: translateX(-50%); color: #282a36; font-family: 'Arial Black', sans-serif; font-size: 2.5rem; font-style: italic; letter-spacing: -1.5px; }
        .model-name { position: absolute; top: 2.5vh; right: 29vw; color: #8f93a1; font-family: 'Arial Black', sans-serif; font-size: 0.85rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 1px 2px #000; }

        .numark-deck { width: 38%; height: 100%; position: relative; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }

        .numark-jog {
            width: 28vh; height: 28vh; max-width: 270px; max-height: 270px; background: #191a22; border-radius: 50%; position: relative;
            box-shadow: 0 14px 30px rgba(0,0,0,0.85), inset 0 0 25px #000;
            background-image: repeating-conic-gradient(from 0deg, #2e303d 0deg 3deg, #13141a 3deg 6deg);
            border: 3px solid #08080c; animation: spinDisc calc(var(--ritmo-eq) * 8) infinite linear;
        }
        .numark-jog-inner { position: absolute; top: 8%; left: 8%; right: 8%; bottom: 8%; background: radial-gradient(circle, #2a2c3a 20%, #171821 65%, #0b0c12 100%); border-radius: 50%; border: 3px solid #030305; }
        .numark-jog-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 38%; height: 38%; background: radial-gradient(circle, #ffffff 10%, #b3b6c2 45%, #484a54 90%, #1a1b22 100%); border-radius: 50%; border: 3px solid #000000; display: flex; align-items: center; justify-content: center; }
        .numark-jog-center::before { content: 'N'; font-family: 'Arial Black', sans-serif; font-size: 1.4rem; color: #000000; font-style: italic; font-weight: 900; }
        .numark-jog-needle { position: absolute; top: 0; left: 50%; width: 4px; height: 14%; background: #ffffff; transform: translateX(-50%); }

        .numark-pitch-container { position: absolute; right: 4%; top: 15%; width: 30px; height: 48%; display: flex; flex-direction: column; align-items: center; }
        .numark-pitch-track { width: 6px; height: 100%; background: #000000; border-radius: 3px; position: relative; border-left: 1px solid #333; }
        .numark-pitch-handle { width: 28px; height: 14px; background: #3b3e4d; border: 2px solid #ffffff; position: absolute; left: -11px; top: 35%; border-radius: 3px; box-shadow: 0 3px 6px #000; }
        .pitch-lines { position: absolute; left: -14px; height: 100%; width: 8px; background: repeating-linear-gradient(to bottom, #ffffff, #ffffff 1px, transparent 1px, transparent 10px); opacity: 0.85; }

        .numark-pads-section { display: flex; gap: 1.5vw; align-items: center; width: 85%; margin-top: 1.5vh; }
        .pads-grid { display: grid; grid-template-columns: repeat(2, 48px); grid-template-rows: repeat(2, 34px); gap: 8px; }
        .pad {
            background: #ff1a26; border: 2px solid #ffffff; border-radius: 5px; color: #ffffff; font-size: 0.85rem; font-weight: 900; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6), 0 0 12px rgba(255, 26, 38, 0.4); text-shadow: 0 1px 2px #000;
            animation: padGlow var(--ritmo-eq) infinite alternate ease-in-out;
        }
        .pad:nth-child(even) { animation-delay: 0.2s; }
        .pad-modes { display: flex; flex-direction: column; gap: 3px; font-size: 0.6rem; color: #858b9c; font-weight: 800; text-transform: uppercase; }
        .pad-mode-active { color: #ff1a26; }

        .numark-transport { display: flex; gap: 12px; width: 85%; margin-top: 1.5vh; }
        .btn-transport { flex: 1; height: 40px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 10px rgba(0,0,0,0.6), inset 0 2px 3px rgba(255,255,255,0.4); border: 2.5px solid #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .btn-sync { background: #0088cc; color: #ffffff; box-shadow: 0 0 15px rgba(0,136,204,0.5); }
        .btn-cue { background: #cc0022; color: #ffffff; box-shadow: 0 0 15px rgba(204,0,34,0.5); }
        .btn-play { background: #00aa33; color: #ffffff; box-shadow: 0 0 15px rgba(0,170,51,0.5); font-size: 1rem; }

        /* --- MIXER CENTRALE --- */
        .numark-mixer { width: 24%; height: 100%; background: #06070a; border-left: 3px solid #232530; border-right: 3px solid #232530; display: flex; flex-direction: column; align-items: center; padding: 1.5vh 0.8vw; justify-content: space-between; }
        .console-track-selector { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-bottom: 5px; }
        .console-track-btn { width: 100%; height: 28px; border: 2px solid #ffffff; border-radius: 4px; font-size: 0.68rem; font-weight: 900; text-transform: uppercase; color: #ffffff; display: flex; align-items: center; justify-content: center; cursor: pointer; letter-spacing: 0.5px; transition: transform 0.05s ease, box-shadow 0.1s ease; text-shadow: 0 1px 2px #000; }
        
        .console-track-btn.active-track { border-color: #fff !important; box-shadow: 0 0 18px #fff !important; transform: scale(0.97); filter: brightness(1.3); }
        .btn-traccia-1 { background: #006699; box-shadow: 0 0 8px rgba(0,102,153,0.6); }
        .btn-traccia-2 { background: #990033; box-shadow: 0 0 8px rgba(153,0,51,0.6); }
        .btn-traccia-3 { background: #660099; box-shadow: 0 0 8px rgba(102,0,153,0.6); }

        .mixer-channels-wrapper { display: flex; width: 100%; justify-content: space-between; height: 56%; }
        .mixer-ch { width: 46%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .mini-knob { width: 22px; height: 22px; background: #1f212b; border: 2px solid #ffffff; border-radius: 50%; position: relative; box-shadow: 0 3px 5px rgba(0,0,0,0.5); }
        .mini-knob::before { content: ''; position: absolute; top: 2px; left: 8px; width: 3px; height: 6px; background: #ff1a26; border-radius: 1px; }
        .knob-txt { font-size: 0.52rem; color: #ffffff; font-weight: 900; margin-top: -1px; text-shadow: 0 1px 1px #000; }

        .volume-fader-container { height: 75px; width: 100%; position: relative; display: flex; justify-content: center; }
        .fader-ticks { position: absolute; left: 10%; width: 80%; height: 100%; background: repeating-linear-gradient(to bottom, #ffffff, #ffffff 1px, transparent 1px, transparent 10px); opacity: 0.75; }
        .volume-fader-track { width: 6px; height: 100%; background: #000000; position: relative; z-index: 2; border-radius: 3px; }
        .volume-fader-handle { width: 26px; height: 14px; background: #333645; border: 2px solid #ffffff; position: absolute; left: -10px; bottom: 55%; border-radius: 3px; box-shadow: 0 4px 8px #000; animation: volumeBounce var(--ritmo-eq) infinite alternate ease-in-out; }

        .crossfader-container { width: 95%; height: 26px; position: relative; display: flex; align-items: center; margin-top: 5px; }
        .crossfader-track { width: 100%; height: 6px; background: #000000; position: relative; border-radius: 3px; }
        .crossfader-handle { width: 16px; height: 24px; background: #333645; border: 2px solid #ffffff; position: absolute; top: -9px; left: 45%; border-radius: 3px; box-shadow: 0 4px 8px rgba(0,0,0,0.7); }

        .exit-view-btn { position: absolute; top: 4vh; right: 4vw; background: #ffffff; color: #000000; border: 3px solid #ff0055; padding: 12px 26px; font-size: 0.95rem; font-weight: 900; text-transform: uppercase; cursor: pointer; border-radius: 6px; box-shadow: 0 0 20px rgba(255,0,85,0.6); pointer-events: auto; letter-spacing: 1.5px; }

        /* --- VISTE E TRANSIZIONI --- */
        body.dj-mode-active #dj-first-person-view { opacity: 1; pointer-events: auto; }
        body.dj-mode-active .numark-party-mix { transform: translateY(0); }
        body.dj-mode-active #dancefloor-low { transform: scale(1.3) translateY(150px); opacity: 0.04; }
        body.dj-mode-active #palco-posteriore, body.dj-mode-active .stage-fence { opacity: 0; pointer-events: none; }

        /* --- ANIMATIONS KEYFRAMES --- */
        @keyframes intenseStrobe { 0%, 100% { background: rgba(255, 255, 255, 0); } 50% { background: var(--colore-strobo); } }
        @keyframes laserScanLeft { 0% { transform: rotate(-38deg); } 100% { transform: rotate(45deg); } }
        @keyframes laserScanRight { 0% { transform: rotate(38deg); } 100% { transform: rotate(-45deg); } }
        @keyframes jumpBar { 0% { height: 10%; } 100% { height: 90%; } }
        @keyframes punchBass { 0% { transform: scale(0.95); } 100% { transform: scale(1.06); } }
        @keyframes spinDisc { 100% { transform: rotate(360deg); } }
        @keyframes djHeadBang { 0% { transform: scaleY(0.94) translateY(2px); } 100% { transform: scaleY(1.04) translateY(-2px); } }
        @keyframes padGlow { 0% { background: #bd0915; box-shadow: 0 0 4px rgba(255,0,0,0.3); } 100% { background: #ff2e3b; box-shadow: 0 0 14px rgba(255,26,38,0.75); } }
        @keyframes volumeBounce { 0% { transform: translateY(6px); } 100% { transform: translateY(-8px); } }
        @keyframes ratGlobalDance {
            0% { transform: translateY(0) rotate(var(--rot-start)) scale(var(--base-scale)); }
            100% { transform: translateY(var(--jump-dist)) rotate(var(--rot-end)) scale(var(--base-scale)); }
        }
    </style>
</head>
<body>

    <audio id="audio-traccia-1" src="KRUSHANDGO.mp3" preload="auto"></audio>
    <audio id="audio-traccia-2" src="femtanyl x issbrokie - NASTYWERKKKK.mp3" preload="auto"></audio>
    <audio id="audio-traccia-3" src="FindMyName - rebel (k1ll the beat)  official release.mp3" preload="auto"></audio>

    <div class="ambient-strobo" id="strobe-layer"></div>
    <div class="led-wash-left"></div>
    <div class="led-wash-right"></div>

    <div class="laser-container">
        <div class="laser l-cyan"></div>
        <div class="laser l-pink"></div>
        <div class="laser l-lime"></div>
        <div class="laser l-yellow"></div>
    </div>

    <img src="zampa1.png" class="cat-paw-img" id="cat-paw-left" alt="Zampa Gatto">
    <img src="zampa1.png" class="cat-paw-img" id="cat-paw-right" alt="Zampa Gatto">

    <div class="ceiling">
        <div class="disco-ball-container">
            <div class="rod"></div><div class="disco-ball"></div>
        </div>
    </div>

    <div class="stage-backdrop" id="palco-posteriore">
        <div class="audio-stack left" onclick="attaccaGatto('sinistra', event)">
            <div class="speaker-cone"></div><div class="speaker-cone"></div>
        </div>

        <div class="led-wall">
            <div class="graphic-equalizer">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>
            
            <div class="text-container">
                <div class="main-proverb-display" id="main-screen">Quando il gatto non c'è i topi ballano</div>
                <div class="sub-instruction-display" id="sub-screen">Tocca il topo DJ per toccare la console</div>
            </div>
        </div>

        <div class="dj-booth-group" onclick="attivaVisualeDJ()">
            <div class="dj-rat">
                <div class="dj-headphones"></div>
                <div class="ear left"></div><div class="ear right"></div><div class="snout"></div>
                <div class="eye left"></div><div class="eye right"></div>
            </div>
            <div class="dj-table">
                <div class="mini-jog"></div><div class="mini-mixer"></div><div class="mini-jog"></div>
            </div>
        </div>

        <div class="audio-stack right" onclick="attaccaGatto('destra', event)">
            <div class="speaker-cone"></div><div class="speaker-cone"></div>
        </div>
    </div>

    <div class="stage-fence"></div>
    <div id="dancefloor-low"></div>


    <div id="dj-first-person-view">
        <button class="exit-view-btn" onclick="disattivaVisualeDJ()">Torna al Club</button>
        
        <div class="numark-party-mix">
            <div class="brand-logo-top">Numark</div>
            <div class="model-name">PARTY MIX</div>
            
            <div class="numark-deck">
                <div class="numark-jog"><div class="numark-jog-inner"><div class="numark-jog-center"></div><div class="numark-jog-needle"></div></div></div>
                <div class="numark-pitch-container"><div class="pitch-lines"></div><div class="numark-pitch-track"><div class="numark-pitch-handle"></div></div></div>
                <div class="numark-pads-section">
                    <div class="pads-grid"><div class="pad">1</div><div class="pad">2</div><div class="pad">3</div><div class="pad">4</div></div>
                    <div class="pad-modes"><div class="pad-mode-active">● Hot Cue</div><div>● Loop</div><div>● Sample</div><div>● Effect</div></div>
                </div>
                <div class="numark-transport"><div class="btn-transport btn-sync">SYNC</div><div class="btn-transport btn-cue">CUE</div><div class="btn-transport btn-play">▶‖</div></div>
            </div>

            <div class="numark-mixer">
                <div class="console-track-selector">
                    <div id="btn-t1" class="console-track-btn btn-traccia-1" onclick="cambiaTraccia(1)">Traccia 1</div>
                    <div id="btn-t2" class="console-track-btn btn-traccia-2" onclick="cambiaTraccia(2)">Traccia 2</div>
                    <div id="btn-t3" class="console-track-btn btn-traccia-3" onclick="cambiaTraccia(3)">Traccia 3</div>
                </div>

                <div class="mixer-channels-wrapper">
                    <div class="mixer-ch">
                        <div class="mini-knob"></div><span class="knob-txt">GAIN</span>
                        <div class="mini-knob"></div><span class="knob-txt">TREBLE</span>
                        <div class="mini-knob"></div><span class="knob-txt">BASS</span>
                        <div class="volume-fader-container"><div class="fader-ticks"></div><div class="volume-fader-track"><div class="volume-fader-handle"></div></div></div>
                    </div>
                    <div class="mixer-ch">
                        <div class="mini-knob"></div><span class="knob-txt">GAIN</span>
                        <div class="mini-knob"></div><span class="knob-txt">TREBLE</span>
                        <div class="mini-knob"></div><span class="knob-txt">BASS</span>
                        <div class="volume-fader-container"><div class="fader-ticks"></div><div class="volume-fader-track"><div class="volume-fader-handle" style="bottom: 32%;"></div></div></div>
                    </div>
                </div>
                <div class="crossfader-container"><div class="crossfader-track"><div class="crossfader-handle"></div></div></div>
            </div>

            <div class="numark-deck">
                <div class="numark-jog"><div class="numark-jog-inner"><div class="numark-jog-center"></div><div class="numark-jog-needle" style="transform: rotate(55deg); transform-origin: bottom center;"></div></div></div>
                <div class="numark-pitch-container" style="left: auto; right: 4%;"><div class="pitch-lines"></div><div class="numark-pitch-track"><div class="numark-pitch-handle" style="top: 20%;"></div></div></div>
                <div class="numark-pads-section">
                    <div class="pads-grid"><div class="pad">1</div><div class="pad">2</div><div class="pad">3</div><div class="pad">4</div></div>
                    <div class="pad-modes"><div class="pad-mode-active">● Hot Cue</div><div>● Loop</div><div>● Sample</div><div>● Effect</div></div>
                </div>
                <div class="numark-transport"><div class="btn-transport btn-sync">SYNC</div><div class="btn-transport btn-cue">CUE</div><div class="btn-transport btn-play">▶‖</div></div>
            </div>

            <div class="brand-logo-front">Numark</div>
        </div>
    </div>

    <script>
        const testiPlaylist = [
            "PLAYING: Traccia 1 - Gorgonzola (5 mesi)",
            "PLAYING: Traccia 2 - Groviera (36 mesi)",
            "PLAYING: Traccia 3 - Toma piccante (1 mese)"
        ];

        let bloccoAttaccoGatto = false;
        let tracciaSalvaNome = "";

        const configurazioneBPM = {
            1: { strobo: "0.08s", laserL: "1.0s", laserR: "1.1s", eq: "0.35s", topi: 0.42, coloreLuce: "rgba(0, 240, 255, 0.2)" },
            2: { strobo: "0.04s", laserL: "0.45s", laserR: "0.5s", eq: "0.20s", topi: 0.25, coloreLuce: "rgba(255, 0, 80, 0.25)" },
            3: { strobo: "0.16s", laserL: "2.3s", laserR: "2.5s", eq: "0.65s", topi: 0.70, coloreLuce: "rgba(180, 0, 255, 0.22)" }
        };

        /* 👑 INSERITO QUI (DENTRO LE FUNZIONI): LOGICA JAVASCRIPT SDOPPIATA PER LA GESTIONE DEI DUE SCHERMI COMPATIBILI CON L'ATTACCO */
        function attaccaGatto(lato, evento) {
            if (bloccoAttaccoGatto) return;
            bloccoAttaccoGatto = true;

            if (evento) evento.stopPropagation();

            const pawLeft = document.getElementById('cat-paw-left');
            const pawRight = document.getElementById('cat-paw-right');
            const mainScreen = document.getElementById('main-screen');
            const subScreen = document.getElementById('sub-screen');
            const root = document.documentElement;

            tracciaSalvaNome = subScreen.textContent;

            // Modifica dinamica della riga superiore e inferiore durante il panico dell'attacco
            mainScreen.textContent = "⚠️ CAT ATTACK!!! ⚠️";
            mainScreen.style.color = "#ff002b";
            mainScreen.style.textShadow = "0 0 20px #ff0000, 0 0 45px #ff0000";

            subScreen.textContent = "RUN FOR YOUR LIFE!!!";
            subScreen.style.color = "#ff002b";
            subScreen.style.textShadow = "0 0 10px #ff0000";

            root.style.setProperty('--ritmo-strobo', '0.02s');
            root.style.setProperty('--colore-strobo', 'rgba(255, 0, 40, 0.45)');

            const tuttiITopi = document.querySelectorAll('.rat-character');
            tuttiITopi.forEach(topo => { topo.style.animationDuration = '0.11s'; });

            const zampaAttiva = (lato === 'sinistra') ? pawLeft : pawRight;
            const classeAnimazione = (lato === 'sinistra') ? 'animate-paw-left' : 'animate-paw-right';

            zampaAttiva.src = "zampa1.png";
            zampaAttiva.classList.add(classeAnimazione);

            setTimeout(() => {
                if (bloccoAttaccoGatto) zampaAttiva.src = "zampa2.png";
            }, 400);

            setTimeout(() => {
                if (bloccoAttaccoGatto) zampaAttiva.src = "zampa1.png";
            }, 1600);

            setTimeout(() => {
                pawLeft.classList.remove('animate-paw-left');
                pawRight.classList.remove('animate-paw-right');
                pawLeft.src = "zampa1.png";
                pawRight.src = "zampa1.png";

                // Ripristino delle frasi normali post-attacco
                mainScreen.textContent = "Quando il gatto non c'è i topi ballano";
                subScreen.textContent = tracciaSalvaNome || "Tocca il topo DJ per toccare la console";
                
                const tracciaAttiva = document.querySelector('.active-track');
                const idTraccia = tracciaAttiva ? parseInt(tracciaAttiva.id.replace('btn-t', '')) : 1;
                
                const ritmo = configurazioneBPM[idTraccia];
                root.style.setProperty('--ritmo-strobo', ritmo.strobo);
                root.style.setProperty('--colore-strobo', ritmo.coloreLuce);
                
                const coloriHUD = ["#00ffff", "#ff0055", "#cc00ff"];
                const coloreCorrente = coloriHUD[idTraccia - 1];
                
                mainScreen.style.color = "#ffffff";
                mainScreen.style.textShadow = `0 0 15px ${coloreCorrente}, 0 0 30px ${coloreCorrente}`;
                subScreen.style.color = coloreCorrente;
                subScreen.style.textShadow = `0 0 8px ${coloreCorrente}`;

                tuttiITopi.forEach(topo => {
                    const variazioneCasuale = (Math.random() * 0.14) - 0.07;
                    topo.style.animationDuration = (ritmo.topi + variazioneCasuale).toFixed(2) + 's';
                });

                bloccoAttaccoGatto = false;
            }, 2400);
        }

        /* 👑 INSERITO QUI: LOGICA DI AGGIORNAMENTO DELLE FRASI DURANTE IL CAMBIO DJ PLAYLIST */
        function cambiaTraccia(numeroTraccia) {
            const mainScreen = document.getElementById('main-screen');
            const subScreen = document.getElementById('sub-screen');
            
            // Aggiorna solo la riga inferiore con il nome della traccia (il proverbio sopra resta fisso)
            subScreen.textContent = testiPlaylist[numeroTraccia - 1];
            
            const coloriHUD = ["#00ffff", "#ff0055", "#cc00ff"];
            const coloreScelto = coloriHUD[numeroTraccia - 1];

            mainScreen.style.textShadow = `0 0 15px ${coloreScelto}, 0 0 30px ${coloreScelto}`;
            subScreen.style.color = coloreScelto;
            subScreen.style.textShadow = `0 0 8px ${coloreScelto}`;

            for(let i=1; i<=3; i++) {
                document.getElementById(`btn-t${i}`).classList.remove('active-track');
            }
            document.getElementById(`btn-t${numeroTraccia}`).classList.add('active-track');

            const ritmo = configurazioneBPM[numeroTraccia];
            const root = document.documentElement;
            
            root.style.setProperty('--ritmo-strobo', ritmo.strobo);
            root.style.setProperty('--ritmo-laser-l', ritmo.laserL);
            root.style.setProperty('--ritmo-laser-r', ritmo.laserR);
            root.style.setProperty('--ritmo-eq', ritmo.eq);
            root.style.setProperty('--ritmo-topi-base', ritmo.topi + 's');
            root.style.setProperty('--colore-strobo', ritmo.coloreLuce);

            const tuttiITopi = document.querySelectorAll('.rat-character');
            tuttiITopi.forEach(topo => {
                const variazioneCasuale = (Math.random() * 0.14) - 0.07;
                topo.style.animationDuration = (ritmo.topi + variazioneCasuale).toFixed(2) + 's';
            });

            for (let i = 1; i <= 3; i++) {
                const player = document.getElementById(`audio-traccia-${i}`);
                if (player) { player.pause(); player.currentTime = 0; }
            }
            const playerSelezionato = document.getElementById(`audio-traccia-${numeroTraccia}`);
            if (playerSelezionato) {
                playerSelezionato.play().catch(e => console.log("Audio in attesa di interazione."));
            }
        }

        function attivaVisualeDJ() { document.body.classList.add('dj-mode-active'); }
        function disattivaVisualeDJ() { document.body.classList.remove('dj-mode-active'); }

        // --- GENERATORE DANCEFLOOR (130 TOPI) ---
        const dancefloor = document.getElementById('dancefloor-low');
        const numeroTopi = 130; 
        const coloriPelo = ['#252530', '#1c1c24', '#323242', '#2d2d3a', '#17171f'];

        for (let i = 0; i < numeroTopi; i++) {
            const topo = document.createElement('div');
            topo.className = 'rat-character';
            const posYRelativa = Math.random() * 85;
            const percentualeAltezza = posYRelativa / 100;
            const scalaCasuale = 0.5 + (percentualeAltezza * 0.65);

            topo.style.width = (52 * scalaCasuale) + 'px';
            topo.style.height = (78 * scalaCasuale) + 'px';
            topo.style.left = (Math.random() * 95) + 'vw';
            topo.style.top = posYRelativa + '%';

            const ritardoFase = (Math.random() * 0.5).toFixed(2);
            const altezzaSalto = -Math.floor(18 + Math.random() * 16) * scalaCasuale;
            const coloreCasuale = coloriPelo[Math.floor(Math.random() * coloriPelo.length)];

            topo.style.setProperty('--base-scale', scalaCasuale);
            topo.style.setProperty('--jump-dist', altezzaSalto + 'px');
            topo.style.setProperty('--rot-start', ((-5 + Math.random() * 10) + 'deg'));
            topo.style.setProperty('--rot-end', ((-5 + Math.random() * 10) + 'deg'));
            
            topo.style.animationDelay = ritardoFase + 's';
            topo.style.zIndex = Math.floor(posYRelativa + 10);

            topo.innerHTML = `
                <div class="rat-ear left" style="background: ${coloreCasuale}"></div>
                <div class="rat-ear right" style="background: ${coloreCasuale}"></div>
                <div class="rat-body" style="background: ${coloreCasuale}">
                    <div class="rat-snout" style="background: ${coloreCasuale}"></div>
                    <div class="rat-eye left" style="background: #00ffff; box-shadow: 0 0 6px #00ffff;"></div>
                    <div class="rat-eye right" style="background: #00ffff; box-shadow: 0 0 6px #00ffff;"></div>
                </div>
                <div class="rat-tail" style="height: ${85 * scalaCasuale}px; bottom: -${16 * scalaCasuale}px;"></div>
            `;
            dancefloor.appendChild(topo);
        }
    </script>
</body>
</html>
