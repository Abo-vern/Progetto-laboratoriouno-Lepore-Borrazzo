<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donato - Web Art Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* --- PULSANTE TORNA AL MENU (SPOSTATO IN BASSO A SINISTRA E INGRANDITO) --- */
        .torna-menu {
            position: absolute;
            bottom: 30px; /* Posizionato in basso */
            left: 30px;   /* Posizionato a sinistra */
            text-decoration: none;
            color: #a39678;
            font-family: 'Georgia', serif;
            font-size: 1.4rem; /* Testo ancora più grande */
            letter-spacing: 5px; /* Spaziatura epica tra le lettere */
            text-transform: uppercase;
            padding: 18px 36px; /* Pulsante massiccio */
            border: 2px solid rgba(163, 150, 120, 0.5); 
            background: rgba(7, 7, 9, 0.95); /* Sfondo molto coprente */
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 9999; 
        }

        .torna-menu:hover {
            color: #f6e3b4;
            border-color: #f6e3b4;
            text-shadow: 0 0 15px rgba(246, 227, 180, 0.8);
            box-shadow: 0 0 20px rgba(246, 227, 180, 0.3);
            background: rgba(196, 182, 147, 0.12);
            transform: scale(1.05); /* Leggero effetto di ingrandimento al passaggio */
        }

        .fullscreen-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        #fase-iniziale { z-index: 20; cursor: pointer; }
        #bocca-container { display: none; z-index: 10; }

  .bg-image {
            max-width: 100vw;
            max-height: 100vh;
            min-width: 100vw;  /* Forza l'immagine a coprire tutta la larghezza */
            min-height: 70vh;  /* Copre gran parte dell'altezza riducendo i bordi neri */
            object-fit: contain; 
            display: block;
        }
        

        /* OVERLAY ROSSO: RIPRISTINATO IN ALTO A SINISTRA */
        #warning-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 21;
            background: #ff0000;
            padding: 15px 25px;
            border: 2px solid white;
            pointer-events: none;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
        }

        #invito-bocca {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 21;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            pointer-events: none;
        }

        #istruzioni-bocca {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 21;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 12px 24px;
            border: 3px solid #ff4444;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #warning-text {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }

        #fumetto {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 25px 40px;
            border-radius: 10px;
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            display: none;
            z-index: 30;
            border: 6px solid #ff4444;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 0 50px rgba(255,255,255,0.3);
            max-width: 80%;
        }

        #messaggio-finale {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            color: black;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .testo-proverbio {
            font-family: 'Bebas Neue', cursive;
            font-size: 10vw;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 40px;
        }

        #btn-reset {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            background: #ff0000;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 5px 5px 0px black;
            opacity: 0;
            transform: scale(0);
            display: none;
        }

        #btn-reset.visualizzato {
            display: block;
            opacity: 1;
            transform: scale(1);
            animation: comparePiano 1s ease-out forwards;
        }

        #btn-reset.visualizzato:hover {
            background: #cc0000;
            transform: scale(1.05);
            transition: transform 0.2s, background 0.2s;
        }

        @keyframes comparePiano {
            0% { opacity: 0; transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        area { cursor: pointer; }
    </style>
</head>
<body>

    <a href="../menu_principale" class="torna-menu">← Interregno</a>

    <div id="fase-iniziale" class="fullscreen-container" onclick="gestisciClickIniziali()">
        <img src="cavallo.jpg" id="cavallo-full" class="bg-image">
        <div id="warning-overlay">
            <p id="warning-text">Non guardare assolutamente la bocca di questo cavallo</p>
        </div>
        <div id="invito-bocca">clicca sulla bocca del cavallo</div>
    </div>

    <div id="bocca-container" class="fullscreen-container">
        <div id="istruzioni-bocca">Controlla tra i denti di Donato</div>
        <img src="bocca cavallo.jpg" usemap="#image-map" id="foto-bocca" class="bg-image">
        <div id="fumetto"></div>

        <map name="image-map" id="horse-map">
            <area alt="dente 1" coords="580,453,555,407" shape="rect">
            <area alt="dente 2" coords="549,456,520,403" shape="rect">
            <area alt="dente 3" coords="486,461,517,402" shape="rect">
            <area alt="dente 4" coords="454,394,482,457" shape="rect">
            <area alt="dente 5" coords="428,398,452,454" shape="rect">
            <area alt="dente 6" coords="571,659,598,697" shape="rect">
            <area alt="dente 7" coords="544,672,573,710" shape="rect">
            <area alt="dente 8" coords="519,671,543,713" shape="rect">
            <area alt="dente 9" coords="495,678,519,710" shape="rect">
            <area alt="dente 10" coords="463,654,495,708" shape="rect">
        </map>
    </div>

    <div id="messaggio-finale">
        <div class="testo-proverbio">A CAVAL DONATO<br>NON SI GUARDA IN BOCCA</div>
        <button id="btn-reset" onclick="resetProgetto()">Ritenta la sorte</button>
    </div>

    <script>
        const frasiOriginali = [
            "Ma la patente?", "E il fidanzato?", "La laurea?",
            "Quindi ti hanno assunt* in quel posto?",
            "Se fossi in te, starei più attento a quello che mangi”",
            "Hai pagato le bollette?",
            "Quando ti metti a fare le cose sul serio?",
            "Ma quindi fai i disegni per lavoro? Ma lavoro, lavoro?",
            "Ma quando hai intenzione di andare a vivere per conto tuo?",
            "Quella scadenza l'hai rispettata?",
            "Ma non sei un po' troppo grande per queste cose?",
            "Hai intenzione di vestirti davvero così?",
            "Tuo cugino alla tua età aveva già acceso un mutuo.",
            "Ma quindi studi ancora? Ma quando finisci?",
            "Ti vedo stanco, ma dormi la notte o stai sempre al telefono?",
            "Ma quel progetto che avevi iniziato? Che fine ha fatto?",
            "Non credi sia ora di darsi una regolata?",
            "Eh, ai miei tempi ci si accontentava di quello che c'era.",
            "Ma lo sai che il figlio della vicina si è appena sposato?",
            "Certo che di questi tempi... chi te lo fa fare?"
        ];

        let frasiMescolate = [];
        let clickIniziali = 0;
        let dentiCliccati = new Set();
        const LIMITE_DENTI = 3; 
        
        const areas = document.querySelectorAll('area');
        const originalCoords = Array.from(areas).map(a => a.coords.split(',').map(Number));

        function shuffleFrasi() {
            let pool = [...frasiOriginali];
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            frasiMescolate = pool.slice(0, 10);

            areas.forEach((area, index) => {
                area.onmousedown = () => mostra(index);
                area.onmouseup = () => nascondi();
                area.ontouchstart = (e) => { e.preventDefault(); mostra(index); };
                area.ontouchend = () => nascondi();
            });
        }

        function resizeMap() {
            const img = document.getElementById('foto-bocca');
            const w = img.width;
            const h = img.height;
            const nativeW = img.naturalWidth;
            const nativeH = img.naturalHeight;
            if (nativeW === 0) return;
            areas.forEach((area, i) => {
                const coords = originalCoords[i];
                const scaled = coords.map((c, index) => {
                    return index % 2 === 0 ? Math.round(c * (w / nativeW)) : Math.round(c * (h / nativeH));
                });
                area.coords = scaled.join(',');
            });
        }

        window.addEventListener('resize', resizeMap);
        document.getElementById('foto-bocca').onload = resizeMap;

        function gestisciClickIniziali() {
            clickIniziali++;
            const txt = document.getElementById('warning-text');
            if (clickIniziali === 1) {
                txt.innerText = "Ti ho detto di no!";
                document.getElementById('invito-bocca').style.color = "rgba(255, 255, 255, 1)";
            } else if (clickIniziali === 2) {
                shuffleFrasi(); 
                document.getElementById('fase-iniziale').style.display = 'none';
                document.getElementById('bocca-container').style.display = 'flex';
                document.getElementById('istruzioni-bocca').style.display = 'block';
                setTimeout(resizeMap, 50);
            }
        }

        function mostra(index) {
            const fumetto = document.getElementById('fumetto');
            fumetto.innerText = frasiMescolate[index];
            fumetto.style.display = 'block';
            dentiCliccati.add(index);
            
            if (dentiCliccati.size >= LIMITE_DENTI) {
                setTimeout(checkFinale, 800);
            }
        }

        function nascondi() {
            document.getElementById('fumetto').style.display = 'none';
        }

        function checkFinale() {
            if (document.getElementById('fumetto').style.display === 'none' && dentiCliccati.size >= LIMITE_DENTI) {
                document.getElementById('messaggio-finale').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('btn-reset').classList.add('visualizzato');
                }, 1000);
            } else if (dentiCliccati.size >= LIMITE_DENTI) {
                setTimeout(checkFinale, 300);
            }
        }

        function resetProgetto() {
            document.getElementById('btn-reset').classList.remove('visualizzato');
            clickIniziali = 0;
            dentiCliccati.clear();
            document.getElementById('warning-text').innerText = "Non guardare assolutamente la bocca di questo cavallo";
            document.getElementById('invito-bocca').style.color = "rgba(255, 255, 255, 0.5)";
            document.getElementById('messaggio-finale').style.display = 'none';
            document.getElementById('bocca-container').style.display = 'none';
            document.getElementById('istruzioni-bocca').style.display = 'none';
            document.getElementById('fase-iniziale').style.display = 'flex';
        }
    </script>
</body>
</html>
