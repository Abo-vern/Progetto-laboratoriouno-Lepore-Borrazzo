<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi dorme non pija pesci - Progetto Interattivo</title>
    <style>
        /* --- RESET BASE --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e0f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .scena {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- PULSANTE TORNA AL MENU (STILE ELDEN RING - IN ALTO A SINISTRA) --- */
        .torna-menu {
            position: absolute;
            top: 30px; 
            left: 30px;   
            text-decoration: none;
            color: #a39678;
            font-family: 'Georgia', serif;
            font-size: 1.4rem; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            padding: 18px 36px; 
            border: 2px solid rgba(163, 150, 120, 0.5); 
            background: rgba(7, 7, 9, 0.95); 
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 9999; 
        }

        .torna-menu:hover {
            color: #f6e3b4;
            border-color: #f6e3b4;
            text-shadow: 0 0 15px rgba(246, 227, 180, 0.8);
            box-shadow: 0 0 20px rgba(246, 227, 180, 0.3);
            background: rgba(196, 182, 147, 0.12);
            transform: scale(1.05); 
        }

        /* --- CIELO ARTICO --- */
        .cielo {
            position: relative;
            height: 65%;
            background: linear-gradient(to bottom, #203a43, #2c5364, #bdc3c7);
            z-index: 1;
        }

        .sole {
            width: 50px;
            height: 50px;
            background: #fffbe0;
            border-radius: 50%;
            position: absolute;
            top: 60px;
            right: 80px;
            box-shadow: 0 0 50px 15px rgba(255, 255, 255, 0.6);
        }

        /* --- MONTAGNE --- */
        .contenitore-montagne {
            position: absolute;
            bottom: 35%;
            width: 100%;
            height: 40vh;
            z-index: 2;
        }

        .montagna {
            position: absolute;
            bottom: 0;
            background: linear-gradient(135deg, #757f9a 0%, #d7dde8 100%);
        }

        .montagna::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: white;
            opacity: 0.9;
        }

        .m1 {
            left: -5%;
            width: 50%;
            height: 100%;
            clip-path: polygon(0% 100%, 15% 60%, 25% 75%, 40% 30%, 55% 55%, 70% 10%, 85% 50%, 100% 100%);
        }
        .m1::after {
            clip-path: polygon(15% 60%, 25% 75%, 40% 30%, 55% 55%, 70% 10%, 85% 50%, 75% 60%, 65% 50%, 40% 45%, 15% 60%);
        }

        .m2 {
            left: 30%;
            width: 45%;
            height: 80%;
            background: linear-gradient(135deg, #485563 0%, #29323c 100%);
            clip-path: polygon(0% 100%, 10% 40%, 30% 60%, 50% 15%, 70% 55%, 90% 30%, 100% 100%);
            z-index: -1;
        }
        .m2::after {
            clip-path: polygon(10% 40%, 30% 60%, 50% 15%, 70% 55%, 90% 30%, 80% 45%, 50% 35%, 10% 40%);
        }

        .m3 {
            right: -5%;
            width: 40%;
            height: 90%;
            clip-path: polygon(0% 100%, 20% 70%, 40% 20%, 60% 60%, 80% 45%, 100% 100%);
        }
        .m3::after {
            clip-path: polygon(20% 70%, 40% 20%, 60% 60%, 80% 45%, 70% 55%, 40% 40%, 20% 70%);
        }

        /* --- LAGO GHIACCIATO --- */
        .lago-ghiacciato {
            height: 35%;
            background: linear-gradient(to bottom, #8e9eab, #eef2f3);
            border-top: 15px solid #ffffff;
            position: relative;
            z-index: 3;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.1);
        }

        /* --- IL BUCO NEL GHIACCIO FRONTALE --- */
        .buco-contenitore {
            position: absolute;
            top: 46%;
            left: 55%;
            width: 180px;
            height: 90px;
            background: #ffffff;
            clip-path: polygon(10% 20%, 30% 5%, 60% 10%, 90% 25%, 95% 60%, 75% 90%, 40% 95%, 5% 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .acqua {
            width: 90%;
            height: 85%;
            background: #001524;
            clip-path: polygon(12% 22%, 32% 8%, 58% 12%, 88% 27%, 92% 58%, 73% 88%, 42% 92%, 8% 68%);
        }

        /* =========================================================================
           CONTENITORE UNICO 
           ========================================================================= */
        .fisherman-container {
            position: absolute;
            z-index: 15;
            left: 48%;   
            bottom: 280px; 
            width: 300px;  
            height: 260px;
            overflow: visible;
        }

        /* --- BUCO POSTERIORE SPOSTATO ULTERIORMENTE A SINISTRA --- */
        .buco-dietro {
            position: absolute;
            top: 200px; 
            left: -365px; 
            width: 180px;
            height: 90px;
            background: #ffffff;
            clip-path: polygon(90% 20%, 70% 5%, 40% 10%, 10% 25%, 5% 60%, 25% 90%, 60% 95%, 95% 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .acqua-dietro {
            width: 90%;
            height: 85%;
            background: #001524;
            clip-path: polygon(88% 22%, 68% 8%, 42% 12%, 12% 27%, 8% 58%, 27% 88%, 58% 92%, 92% 68%);
        }

        /* --- STRUTTURA PESCI VIVI CHE SGUASZANO --- */
        .fish {
            position: absolute;
            width: 70px;          
            height: 42px;         
            background: linear-gradient(135deg, #ff7b00, #ffaa00);
            border-radius: 50% 55% 50% 55%;
            z-index: 12; 
            opacity: 0;
            bottom: 15px; 
            left: 280px;  
            transform-origin: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* Coda con animazione "sguazzo" */
        .fish::after {
            content: '';
            position: absolute;
            right: -16px;
            top: 6px;
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 22px solid #ff7b00;
            transform-origin: left center;
            animation: scodinzola 0.12s ease-in-out infinite alternate;
        }

        /* Occhio grande */
        .fish::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 10px;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: inset -2px -2px 0 black; 
        }

        /* Pinna laterale */
        .fish-fin {
            position: absolute;
            top: 20px;
            left: 28px;
            width: 14px;
            height: 10px;
            background: #ff9100;
            border-radius: 0 50% 50% 50%;
            transform: rotate(15deg);
        }

        /* Varianti di colore per i pesci successivi */
        .fish:nth-child(2) { background: linear-gradient(135deg, #00bfff, #00f5ff); }
        .fish:nth-child(2)::after { border-left-color: #00bfff; }
        .fish:nth-child(2) .fish-fin { background: #00d5ff; }
        
        .fish:nth-child(3) { background: linear-gradient(135deg, #e066ff, #ff82ab); }
        .fish:nth-child(3)::after { border-left-color: #e066ff; }
        .fish:nth-child(3) .fish-fin { background: #ee82ee; }

        /* Animazione scodinzolio rapido */
        @keyframes scodinzola {
            0% { transform: rotate(-18deg); }
            100% { transform: rotate(18deg); }
        }

        /* --- LOGICA DI MOVIMENTO CONTINUA E ROTAZIONE FLUIDISSIMA --- */
        .jump-animation {
            animation: parabolaSalto 2.4s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        }

        @keyframes parabolaSalto {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg) scaleX(-1);
                opacity: 0;
            }
            8% {
                opacity: 1;
            }
            50% {
                transform: translateX(-310px) translateY(-460px) rotate(-180deg) scaleX(-1);
                opacity: 1;
            }
            92% {
                opacity: 1;
            }
            100% {
                transform: translateX(-620px) translateY(0) rotate(-360deg) scaleX(-1);
                opacity: 0;
            }
        }

        /* Allineamento interno dell'eschimese rispetto al super-contenitore */
        .fisherman {
            position: absolute;
            left: 0;
            top: 0;
            width: 180px;
            height: 260px;
            z-index: 10;
            cursor: pointer;
        }

        /* Sgabello */
        .stool {
            position: absolute;
            bottom: 0;
            left: 68px;
            width: 55px;
            height: 12px;
            background: #6b4b2a;
            border-radius: 4px;
        }

        .stool::before,
        .stool::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 45px;
            background: #5a3d21;
            top: 8px;
        }

        .stool::before { left: 8px; }
        .stool::after { right: 8px; }

        /* Corpo */
        .body {
            position: absolute;
            bottom: 45px;
            left: 45px;
            width: 90px;
            height: 110px;
            background: #8b5e3c;
            border-radius: 45px;
        }

        /* Cappuccio */
        .hood {
            position: absolute;
            top: 25px;
            left: 52px;
            width: 75px;
            height: 75px;
            background: #7a4e2d;
            border-radius: 50%;
            border: 8px solid #f0e0c0;
        }

        /* Testa */
        .face {
            position: absolute;
            top: 42px;
            left: 70px;
            width: 40px;
            height: 40px;
            background: #f4c79b;
            border-radius: 50%;
        }

        /* Occhi chiusi */
        .eye {
            position: absolute;
            width: 10px;
            height: 2px;
            background: black;
            top: 18px;
            transition: all 0.2s ease;
        }

        .eye.left { left: 8px; }
        .eye.right { right: 8px; }

        /* --- STATO SVEGLIO --- */
        .fisherman.sveglio .eye {
            height: 10px;
            border-radius: 50%;
            top: 14px;
        }

        .fisherman.sveglio .zzz {
            display: none;
        }

        /* Braccia */
        .arm {
            position: absolute;
            width: 70px;
            height: 14px;
            background: #7a4e2d;
            top: 110px;
            left: 105px;
            transform: rotate(18deg);
            transform-origin: left center;
            border-radius: 10px;
        }

        /* =========================================================================
           CONTENITORE UNITO DI CANNA E LENZA PER STRATTONE PERFETTO
           ========================================================================= */
        .gruppo-attrezzatura {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform-origin: 145px 115px; 
            transition: transform 0.1s ease;
        }

        /* Elementi inseriti nel blocco unito */
        .rod {
            position: absolute;
            width: 150px;
            height: 4px;
            background: #3a2a18;
            top: 115px;
            left: 145px;
            transform: rotate(-4deg);
            transform-origin: left center;
        }

        .line {
            position: absolute;
            width: 2px;
            height: 210px;
            background: white;
            top: 108px;
            left: 285px;
            z-index: 13; 
        }

        .gruppo-attrezzatura.strattonata-lunga {
            animation: strattona-canna-lunga 3.0s ease-in-out forwards;
        }

        .gruppo-attrezzatura.strattonata-breve {
            animation: strattona-canna-breve 0.6s ease-in-out;
        }

        @keyframes strattona-canna-lunga {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(16deg) translateY(14px); }  
            20% { transform: rotate(-3deg) translateY(-2px); }   
            30% { transform: rotate(18deg) translateY(16px); }  
            40% { transform: rotate(2deg) translateY(1px); }     
            50% { transform: rotate(15deg) translateY(12px); }  
            60% { transform: rotate(-2deg) translateY(-1px); }
            70% { transform: rotate(17deg) translateY(15px); }
            80% { transform: rotate(3deg); }
            90% { transform: rotate(14deg) translateY(8px); }
            100% { transform: rotate(0deg); }
        }

        @keyframes strattona-canna-breve {
            0% { transform: rotate(0deg); }
            33% { transform: rotate(14deg) translateY(10px); }
            66% { transform: rotate(-2deg) translateY(-1px); }
            100% { transform: rotate(0deg); }
        }

        /* ZZZ */
        .zzz {
            position: absolute;
            color: white;
            font-weight: bold;
            animation: sleep 3s infinite;
            opacity: 0.8;
        }

        .z1 { top: 10px; left: 120px; font-size: 20px; }
        .z2 { top: -10px; left: 140px; font-size: 28px; animation-delay: 1s; }
        .z3 { top: -35px; left: 165px; font-size: 36px; animation-delay: 2s; }

        @keyframes sleep {
            0% { transform: translateY(0); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }

        /* --- NEVE --- */
        .fiocco {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
            animation: cade linear infinite;
        }

        @keyframes cade {
            0% { transform: translateY(-10vh) translateX(0); }
            100% { transform: translateY(110vh) translateX(50px); }
        }

        /* =========================================================================
           EFFETTO JUMPSCARE GIGANTE IMMOBILE
           ========================================================================= */
        .contenitore-carpa-giant {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999; 
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0); 
            transition: background 0.05s ease;
        }

        .carpa-giant {
            position: absolute;
            top: 45%; 
            left: 50%;
            width: 100vw;   
            height: 100vh;  
            object-fit: contain; 
            display: block;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
        }

        .scritta-carpa {
            position: absolute;
            top: 92%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-family: Georgia, 'Times New Roman', Times, serif; 
            font-weight: 500; 
            font-size: 8.5rem; 
            color: #4d66cc; 
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 3px 3px 0px #fff, -3px -3px 0px #fff, 3px -3px 0px #fff, -3px 3px 0px #fff, 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            z-index: 100000; 
        }

        .contenitore-carpa-giant.attivo {
            background: rgba(0, 0, 0, 0.45); 
        }

        .contenitore-carpa-giant.attivo .carpa-giant {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2); 
            animation: jumpscare-immediato 0.08s ease-out;
        }

        .contenitore-carpa-giant.attivo .scritta-carpa {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: jumpscare-immediato 0.08s ease-out;
        }

        @keyframes jumpscare-immediato {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="scena">
        
        <a href="../menu_principale" class="torna-menu">← Interregno</a>

        <div class="cielo">
            <div class="sole"></div>
        </div>

        <div class="contenitore-montagne">
            <div class="montagna m2"></div>
            <div class="montagna m1"></div>
            <div class="montagna m3"></div>
        </div>

        <div class="lago-ghiacciato">
            
            <div class="buco-contenitore">
                <div class="acqua"></div>
            </div>

            <div class="fisherman-container">
                
                <div class="buco-dietro">
                    <div class="acqua-dietro"></div>
                </div>

                <div class="fish"><div class="fish-fin"></div></div>
                <div class="fish"><div class="fish-fin"></div></div>
                <div class="fish"><div class="fish-fin"></div></div>

                <div class="fisherman">
                    <div class="zzz z1">Z</div>
                    <div class="zzz z2">Z</div>
                    <div class="zzz z3">Z</div>
                    
                    <div class="stool"></div>
                    <div class="body"></div>
                    <div class="hood"></div>
                    <div class="face">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                    </div>
                    <div class="arm"></div>
                    
                    <div class="gruppo-attrezzatura">
                        <div class="rod"></div>
                        <div class="line"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="contenitore-carpa-giant" id="popupCarpa">
        <img src="carpa.png" class="carpa-giant" alt="Carpa Koi">
        <div class="scritta-carpa">Chi dorme non pija pesci</div>
    </div>

    <script>
        let numButtonClicks = 0;
        
        function buttonClicked() {
            numButtonClicks = numButtonClicks + 1;
        }

        function inizializzaScena() {
            const scena = document.querySelector('.scena');
            const numeroFiocchi = 50;
            for (let i = 0; i < numeroFiocchi; i++) {
                const fiocco = document.createElement('div');
                fiocco.classList.add('fiocco');
                fiocco.style.left = Math.random() * 100 + 'vw';
                const dimensione = Math.random() * 4 + 2 + 'px';
                fiocco.style.width = dimensione;
                fiocco.style.height = dimensione;
                fiocco.style.animationDuration = Math.random() * 5 + 3 + 's';
                fiocco.style.animationDelay = Math.random() * 5 + 's';
                fiocco.style.opacity = Math.random() * 0.7 + 0.3;
                scena.appendChild(fiocco);
            }

            const pesci = document.querySelectorAll('.fish');
            const pescatore = document.querySelector('.fisherman');
            const gruppoAttrezzatura = document.querySelector('.gruppo-attrezzatura');
            const popupCarpa = document.getElementById('popupCarpa');
            let stopRichiesto = false; 
            let timeoutAttivazione = [];
            let timeoutJumpscare = null; 

            function avviaCicloPesci() {
                stopRichiesto = false;
                pesci.forEach((pesce, indice) => {
                    const t = setTimeout(() => {
                        if (!stopRichiesto) {
                            pesce.classList.add('jump-animation');
                        }
                    }, indice * 800);
                    timeoutAttivazione.push(t);
                });
            }

            pesci.forEach(pesce => {
                pesce.addEventListener('animationiteration', (evento) => {
                    if (stopRichiesto) {
                        evento.target.classList.remove('jump-animation');
                    }
                });
            });

            pescatore.addEventListener('mouseenter', () => {
                buttonClicked(); 

                stopRichiesto = true;
                pescatore.classList.add('sveglio');
                
                timeoutAttivazione.forEach(t => clearTimeout(t));
                timeoutAttivazione = [];

                if (numButtonClicks >= 3) {
                    gruppoAttrezzatura.classList.add('strattonata-lunga');
                    
                    timeoutJumpscare = setTimeout(() => {
                        if (pescatore.classList.contains('sveglio')) {
                            popupCarpa.classList.add('attivo');
                        }
                    }, 3000); 
                } else {
                    gruppoAttrezzatura.classList.add('strattonata-breve');
                }
            });

            pescatore.addEventListener('mouseleave', () => {
                pescatore.classList.remove('sveglio');
                gruppoAttrezzatura.classList.remove('strattonata-lunga');
                gruppoAttrezzatura.classList.remove('strattonata-breve');
                
                clearTimeout(timeoutJumpscare);
                popupCarpa.classList.remove('attivo');
                
                if (numButtonClicks >= 3) {
                    numButtonClicks = 0; 
                }

                setTimeout(() => {
                    if (!pescatore.classList.contains('sveglio')) {
                        pesci.forEach(pesce => {
                            if (!pesce.classList.contains('jump-animation')) {
                                pesce.classList.remove('jump-animation');
                            }
                        });
                        avviaCicloPesci();
                    }
                }, 600);
            });

            avviaCicloPesci();
        }

        window.onload = inizializzaScena;
    </script>
</body>
</html>
